[pytest]
# 프로젝트 루트를 sys.path에 추가해 ``src.core.*`` 직접 임포트 가능
pythonpath = .

# 테스트 파일 패턴
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Qt 오프스크린 모드 기본 (CI/서버 안전)
addopts =
    -v
    --tb=short
    --strict-markers

# 사용자 정의 마커
markers =
    slow: 실제 OCR 호출 등 느린 테스트
    ocr: Tesseract + 실제 이미지가 필요한 테스트 (환경 없으면 skip)
